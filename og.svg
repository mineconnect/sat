<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="100%" stop-color="#0a1024"/>
    </linearGradient>
    <radialGradient id="g1" cx="20%" cy="30%">
      <stop offset="0%" stop-color="#00e599" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00e599" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="80%" cy="70%">
      <stop offset="0%" stop-color="#6aa3ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6aa3ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e599"/>
      <stop offset="100%" stop-color="#6aa3ff"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e599"/>
      <stop offset="100%" stop-color="#6aa3ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>
  <g transform="translate(80, 240)">
    <rect width="80" height="80" rx="18" fill="url(#logo)"/>
    <rect x="18" y="18" width="44" height="44" rx="8" fill="#050810"/>
    <rect x="28" y="28" width="24" height="24" rx="4" fill="url(#logo)"/>
  </g>
  <text x="80" y="420" fill="#f0f4ff" font-family="Outfit, system-ui, sans-serif" font-size="80" font-weight="700" letter-spacing="-3">Mine<tspan fill="url(#word)">Connect</tspan></text>
  <text x="80" y="490" fill="#8b95b8" font-family="Outfit, system-ui, sans-serif" font-size="36" font-weight="400">Tecnología, radiocomunicaciones e IA</text>
  <text x="80" y="540" fill="#8b95b8" font-family="Outfit, system-ui, sans-serif" font-size="28" font-weight="400">Catamarca · Argentina · Partner Motorola y Hytera</text>
</svg>
