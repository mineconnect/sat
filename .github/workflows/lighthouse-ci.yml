name: Lighthouse CI

# Audita producción. Mientras el deploy esté en GitHub Pages (sin headers),
# este check falla legítimamente. Después de migrar a Cloudflare Pages,
# descomentar 'pull_request' para volver a chequear en cada PR.
on:
  schedule:
    - cron: "55 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Lighthouse audit
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://mineconnect.com.ar/
            https://mineconnect.com.ar/contacto.html
            https://mineconnect.com.ar/servicios/desarrollo.html
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./.github/lighthouse-budget.json
