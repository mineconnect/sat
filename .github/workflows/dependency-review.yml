name: Dependency Review

# Requiere "Dependency graph" activado en el repo (Settings → Code security).
# Para repos privados free, esa feature puede no estar disponible.
# Marcamos el job como continue-on-error para no bloquear merges mientras
# se activa manualmente. Cuando esté activo, sí enforces severidad alta.

on:
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD, CC0-1.0, Unlicense, BlueOak-1.0.0
