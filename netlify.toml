[build]
  publish = "site"

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    X-DNS-Prefetch-Control = "off"
    X-Permitted-Cross-Domain-Policies = "none"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self' https://wa.me; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'sha256-ByeY4bSHuxUzze2wU5m54m4WIkIkf+HxZnw1g+aSOqo=' 'sha256-Fb/pPBynX2PmIyYFPtebYSA9DsjivR0Tdb8mK6Rz+F0=' 'sha256-FcggUwfOcpd15YC7Rep5wxPSD8L9RUX3YHhLYmCg7LA=' 'sha256-Gh10D1MkwJQLjeHln4z3m41cxkKF80rXSeF+h6zFCOk=' 'sha256-KFUT3g0PvJSZFYTxJEanta8h0nJtNaZgLdQzfXuafO0=' 'sha256-PjQo5McG4h1x8iSjUXrKLEaMGDA1+dEczeAMXWkdKt8=' 'sha256-QlQMs26CqFPu9hdb9kIuYG/5pzbe81bYSqer2Z1ggYs=' 'sha256-THc4nTKt7Gkn38HOSe5/1+qLoTaly7NlHyw40OCq3R4=' 'sha256-ZTjI3H6I90OqyLIJKtrUqfzhih7vLBgOkQENY4uf1Es=' 'sha256-hGrW6RUvUOGr3KCUndvy2CbTfeNHu/kzksjEanmLK10=' 'sha256-jogk7LbllYXl3rzCWQAiuGmcpkBL1gNMWPNSr6eSy0w=' 'sha256-nR+HlRq8WaUWp0FvbMosMYyI+zR1/p4FP2qtVtkG+8s=' 'sha256-qLueEQx0cWam9BQbTbD4aFXNiluxdWC9uhJQH9sVod4=' 'sha256-yUsm8u+xeZIJXhTkbTAAUFHvDA17h1ZZQrdgP+CYpcc=' 'sha256-yir09aAy59gSlVgxnUeORNjZE3Z0xXMZ/AxRgq1Yp0Y='; connect-src 'self' https://mineconnect-chat-api.vercel.app https://*.supabase.co https://*.supabase.in wss://*.supabase.co; manifest-src 'self'; worker-src 'self'; upgrade-insecure-requests; report-uri https://mgeukotlgrjyauwgdjxv.supabase.co/functions/v1/csp-report"
